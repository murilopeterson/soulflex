<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Catálogo de Engenharia</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #8b5cf6; --secondary: #10b981;
            --text: #f8fafc; --border: #334155; --danger: #ef4444;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 30px; }
        h2 { color: var(--primary); margin-top: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 15px; }
        
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #94a3b8; margin-bottom: 5px; }
        input { background: #0f172a; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: var(--primary); outline: none; background: #1e293b; }
        
        .helper { font-size: 0.65rem; color: #64748b; margin-top: 4px; }

        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-add:hover { filter: brightness(1.2); }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; font-size: 0.7rem; border-radius: 4px; }

        .item-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .json-box { background: #000; color: #10b981; padding: 20px; border-radius: 12px; font-family: monospace; font-size: 0.8rem; overflow-x: auto; border: 1px solid var(--secondary); }
    </style>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 30px;">
        <h1>⚙️ Gerenciador de Catálogo Técnico</h1>
        <p style="color: #94a3b8;">Cadastre produtos com variações, tamanhos, alturas e opcionais precificados.</p>
    </header>

    <div class="section">
        <h2>📦 Estrutura do Item</h2>
        <div class="grid-form">
            <div>
                <label>Categoria</label>
                <input type="text" id="p-cat" placeholder="Ex: Vestuário">
            </div>
            <div>
                <label>Modelo</label>
                <input type="text" id="p-model" placeholder="Ex: Jaqueta">
            </div>
            <div>
                <label>Linha (Opcional)</label>
                <input type="text" id="p-line" placeholder="Ex: Racing, Street ou deixe vazio">
            </div>
            <div>
                <label>Preço Base</label>
                <input type="number" id="p-price" placeholder="0.00">
            </div>
        </div>

        <div class="grid-form">
            <div>
                <label>Variações</label>
                <input type="text" id="p-vars" placeholder="Masc:0, Fem:0, Kids:-10">
                <div class="helper">Nome:Preço (ex: Masculino:0)</div>
            </div>
            <div>
                <label>Tamanhos</label>
                <input type="text" id="p-sizes" placeholder="P:0, M:0, G:10, GG:20">
                <div class="helper">Nome:Preço adicional</div>
            </div>
            <div>
                <label>Alturas</label>
                <input type="text" id="p-heights" placeholder="Padrão:0, Longo:15">
                <div class="helper">Ajuste de medida e valor</div>
            </div>
        </div>

        <div class="grid-form">
            <div>
                <label>Opcionais</label>
                <input type="text" id="p-opts" placeholder="Bordado:20, Refletivo:15">
            </div>
            <div>
                <label>Acessórios</label>
                <input type="text" id="p-accs" placeholder="Protetor:80, Sliders:45">
            </div>
        </div>

        <button class="btn btn-add" onclick="saveProduct()">💾 SALVAR NO CATÁLOGO</button>
    </div>

    <div class="section">
        <h2>🛠️ Itens em Linha de Produção</h2>
        <div id="product-list"></div>
    </div>

    <div class="section">
        <h2>📄 JSON Estrutural (my_catalog_v2)</h2>
        <div class="json-box" id="json-preview"></div>
    </div>
</div>

<script>
    // Carrega do banco local
    let catalog = JSON.parse(localStorage.getItem('my_catalog_v2')) || { products: {} };

    // Converte "Nome:Preço, Nome:Preço" em Objeto JavaScript
    function parseInputToObj(str) {
        let obj = {};
        if (!str) return obj;
        str.split(',').forEach(item => {
            let parts = item.split(':');
            let key = parts[0]?.trim();
            let val = parts[1]?.trim();
            if (key) {
                obj[key] = val ? parseFloat(val) : 0;
            }
        });
        return obj;
    }

    function saveProduct() {
        const cat = document.getElementById('p-cat').value.trim();
        const mod = document.getElementById('p-model').value.trim();
        let line = document.getElementById('p-line').value.trim();
        const price = parseFloat(document.getElementById('p-price').value) || 0;

        if (!cat || !mod) return alert("Categoria e Modelo são obrigatórios!");
        
        // Se a linha estiver vazia, define como "Geral"
        if (!line) line = "Geral";

        if (!catalog.products[cat]) catalog.products[cat] = {};
        if (!catalog.products[cat][mod]) catalog.products[cat][mod] = {};
        
        catalog.products[cat][mod][line] = {
            basePrice: price,
            variations: parseInputToObj(document.getElementById('p-vars').value),
            sizes: parseInputToObj(document.getElementById('p-sizes').value),
            heights: parseInputToObj(document.getElementById('p-heights').value),
            optionals: parseInputToObj(document.getElementById('p-opts').value),
            accessories: parseInputToObj(document.getElementById('p-accs').value)
        };

        localStorage.setItem('my_catalog_v2', JSON.stringify(catalog));
        render();
        
        // Limpa campos específicos para agilizar próximo cadastro
        document.getElementById('p-line').value = "";
        document.getElementById('p-price').value = "";
    }

    function removeEntry(cat, mod, line) {
        if(!confirm("Deseja remover esta linha do catálogo?")) return;
        delete catalog.products[cat][mod][line];
        if (Object.keys(catalog.products[cat][mod]).length === 0) delete catalog.products[cat][mod];
        if (Object.keys(catalog.products[cat]).length === 0) delete catalog.products[cat];
        
        localStorage.setItem('my_catalog_v2', JSON.stringify(catalog));
        render();
    }

    function render() {
        const list = document.getElementById('product-list');
        list.innerHTML = '';

        for (let cat in catalog.products) {
            for (let mod in catalog.products[cat]) {
                for (let line in catalog.products[cat][mod]) {
                    const data = catalog.products[cat][mod][line];
                    const div = document.createElement('div');
                    div.className = 'item-card';
                    div.innerHTML = `
                        <div>
                            <span style="color:var(--primary); font-size:0.7rem; font-weight:bold;">${cat.toUpperCase()}</span>
                            <div style="font-size:1rem; font-weight:bold;">${mod} <span style="color:#94a3b8; font-weight:normal;">(${line})</span></div>
                            <div style="font-size:0.75rem; color:#64748b; margin-top:4px;">
                                Base: $${data.basePrice.toFixed(2)} | 
                                Vars: ${Object.keys(data.variations).length} | 
                                Tam: ${Object.keys(data.sizes).length}
                            </div>
                        </div>
                        <button class="btn btn-del" onclick="removeEntry('${cat}', '${mod}', '${line}')">Remover</button>
                    `;
                    list.appendChild(div);
                }
            }
        }
        document.getElementById('json-preview').innerText = JSON.stringify(catalog, null, 2);
    }

    render();
</script>
</body>
</html>
